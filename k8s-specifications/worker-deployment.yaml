apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - image: jfrogartifact1.jfrog.io/docker-trial/worker
        name: worker
      imagePullSecrets: Always
      - name: jfrog-cred
