apiVersion: apps/v1
kind: Deployment
metadata:
  name: result
  labels:
    app: result
spec:
  replicas: {{ .Values.replicas.result }}
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      # 1. Added imagePullSecrets from your global values
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: result
        image: {{ .Values.images.result }}
        ports:
        - containerPort: 80
          name: result
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: result
spec:
  # 2. Made the Service Type dynamic based on values.yaml
  type: {{ .Values.services.result.type | default "ClusterIP" }}
  ports:
  - port: {{ .Values.services.result.port | default 80 }}
    targetPort: 80
    {{- if and (eq .Values.services.result.type "NodePort") .Values.services.result.nodePort }}
    nodePort: {{ .Values.services.result.nodePort }}
    {{- end }}
  selector:
    app: result
