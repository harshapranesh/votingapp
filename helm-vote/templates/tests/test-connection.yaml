apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "helm-vote.fullname" . }}-test-connection"
  labels:
    {{- include "helm-vote.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      # Point this specifically to the 'vote' service
      args: ['vote:80'] 
  restartPolicy: Never
