# Replica counts
replicas:
  vote: 2
  result: 2
  worker: 1
  redis: 1
  db: 1

# Image Registry
images:
  vote: jfrogartifact1.jfrog.io/docker-trial/vote
  result: jfrogartifact1.jfrog.io/docker-trial/result
  worker: jfrogartifact1.jfrog.io/docker-trial/worker
  redis: redis:alpine
  db: postgres:15-alpine

# Service configurations
services:
  vote:
    type: LoadBalancer
    port: 80
  result:
    type: LoadBalancer
    port: 80
  redis:
    type: ClusterIP
    port: 6379
  db:
    type: ClusterIP
    port: 5432

# Database Credentials
postgres:
  user: postgres
  password: postgres

# Global settings for secrets
global:
  imagePullSecrets:
    - name: secret

# --- LINTING FIXES (MUST BE LEFT-ALIGNED) ---

serviceAccount:
  create: false
  name: ""

httpRoute:
  enabled: false

ingress:
  enabled: true
  host: voting-app.local

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTarget: 50
