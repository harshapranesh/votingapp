name: Voting App CI/CD

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Login JFrog
      - name: Login to JFrog
        run: |
          docker login ${{ secrets.JF_URL }} \
          -u ${{ secrets.JF_USER }} \
          -p ${{ secrets.JF_PASSWORD }}

      # Build Images
      - name: Build Vote Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:latest -t ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:${{ github.run_number }} ./vote

      - name: Build Result Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/result:latest -t ${{ secrets.JF_URL }}/artifactory/docker-trial/result:${{ github.run_number }} ./result

      - name: Build Worker Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:latest -t ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:${{ github.run_number }} ./worker
      - name: Build number
        run: |
            echo "${{ github.run_number }}"
      # Push Images
      - name: Push Images
        run: |
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:latest ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:${{ github.run_number }} 
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/result:latest ${{ secrets.JF_URL }}/artifactory/docker-trial/result:${{ github.run_number }}
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:latest  ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:${{ github.run_number }}
          docker push ${{ secrets.JF_URL }}/docker-trial/vote:latest ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:${{ github.run_number }}
          docker push ${{ secrets.JF_URL }}/docker-trial/result:latest ${{ secrets.JF_URL }}/artifactory/docker-trial/result:${{ github.run_number }}
          docker push ${{ secrets.JF_URL }}/docker-trial/worker:latest ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:${{ github.run_number }}


      # Deploy
      - name: Deploy to Kubernetes
        run: |
      - name: Create namespace if not exists
        run: kubectl create namespace vote || true
     
