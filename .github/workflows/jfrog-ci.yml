name: Voting App CI/CD

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Login JFrog
      - name: Login to JFrog
        run: |
          docker login ${{ secrets.JF_URL }} \
          -u ${{ secrets.JF_USER }} \
          -p ${{ secrets.JF_PASSWORD }}

      # Build Images
      - name: Build Vote Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:latest ./vote

      - name: Build Result Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/result:latest ./result

      - name: Build Worker Image
        run: |
          docker build -t ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:latest ./worker

      # Push Images
      - name: Push Images
        run: |
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/vote:latest ${{ secrets.JF_URL }}/docker-trial/vote:latest
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/result:latest ${{ secrets.JF_URL }}/docker-trial/result:latest
          docker tag ${{ secrets.JF_URL }}/artifactory/docker-trial/worker:latest ${{ secrets.JF_URL }}/docker-trial/worker:latest
          docker push ${{ secrets.JF_URL }}/docker-trial/vote:latest
          docker push ${{ secrets.JF_URL }}/docker-trial/result:latest
          docker push ${{ secrets.JF_URL }}/docker-trial/worker:latest

      # Deploy
     
