name: Build and Push to JFrog

on:
  push:
    branches: [ "develop" ]
jobs:
  jfrog-pipeline:
    runs-on: ubuntu-latest
    # Explicitly map secrets to job-level environment variables
    env:
      JF_URL: ${{ secrets.JF_URL }}
      JF_URL_CLEAN: ${{ secrets.JF_URL_CLEAN }}
      JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
      
    strategy:
      matrix:
        service: [vote, result, worker]
    
    steps:
      # 1. GIT CLONE
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. SETUP JFROG CLI
      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JFROG_URL: ${{ env.JF_URL }}
          JFROG_TOKEN: ${{ env.JFROG_TOKEN }}

      # 3. IMAGE CREATE & PUSH
      - name: Build and Push Service
        run: |
          # Use the environment variable mapped above
          REGISTRY="${{ env.JF_URL_CLEAN }}"
          
          # Validation to prevent the CLI 'panic' error
          if [ -z "$REGISTRY" ]; then
            echo "ERROR: JF_URL_CLEAN is empty. Go to Settings > Secrets and ensure it is set."
            exit 1
          fi

          IMAGE_NAME="$REGISTRY/voting-repo/${{ matrix.service }}:${{ github.run_number }}"
          
          echo "Processing $IMAGE_NAME"

          # Build and collect metadata
          jf docker build -t "$IMAGE_NAME" ./${{ matrix.service }} \
            --build-name=voting-app \
            --build-number=${{ github.run_number }}
          
          # Push to Artifactory
          jf docker push "$IMAGE_NAME" \
            --build-name=voting-app \
            --build-number=${{ github.run_number }}

      # 4. PUBLISH BUILD INFO
      - name: Publish Build Info
        run: |
          jf rt build-collect-env voting-app ${{ github.run_number }}
          jf rt build-publish voting-app ${{ github.run_number }}
