name: Build, Scan and Push Voting App Images
on:
  push:
    branches: [main]
jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [vote, result, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest \
            ./${{ matrix.service }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest

      - name: Download Sysdig CLI Scanner
        run: |
          curl -LO "https://download.sysdig.com/scanning/sysdig-cli-scanner/latest_version.txt"
          SCANNER_VERSION=$(cat latest_version.txt)
          curl -LO "https://download.sysdig.com/scanning/sysdig-cli-scanner/${SCANNER_VERSION}/linux/amd64/sysdig-cli-scanner"
          chmod +x sysdig-cli-scanner

      - name: Scan with Sysdig CLI Scanner
        env:
          SECURE_API_TOKEN: ${{ secrets.SYSDIG_SECURE_TOKEN }}
        run: |
          ./sysdig-cli-scanner \
            --apiurl https://us4.app.sysdig.com \
            docker://${{ secrets.DOCKERHUB_USERNAME }}/voting-${{ matrix.service }}:latest \
            --console-log \
            || true

      - name: Generate SARIF report
        run: |
          python3 /path/to/sysdig-to-sarif.py report.json > results.sarif

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: results.sarif
