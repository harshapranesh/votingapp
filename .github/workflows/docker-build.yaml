name: Build and Push Docker Images to ACR and ECR

on:
  push:
    branches: [main, dev]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [vote, worker, result]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set repository name based on branch
        id: set-repo
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "REPOSITORY=${{ matrix.service }}-prod" >> $GITHUB_OUTPUT
          else
            echo "REPOSITORY=${{ matrix.service }}-dev" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:${{ env.IMAGE_TAG }} ${{ matrix.service }}/
