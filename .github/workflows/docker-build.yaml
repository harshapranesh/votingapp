name: Build and Push Docker Images to ACR and ECR

on:
  push:
    branches: [main, dev]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [vote, worker, result]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set repository name based on branch
        id: set-repo
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "REPOSITORY=${{ matrix.service }}-prod" >> $GITHUB_OUTPUT
          else
            echo "REPOSITORY=${{ matrix.service }}-dev" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:${{ env.IMAGE_TAG }} ${{ matrix.service }}/

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Tag and Push to ACR
        env:
          REPOSITORY: ${{ steps.set-repo.outputs.REPOSITORY }}
          ACR: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
        run: |
          docker tag ${{ matrix.service }}:${{ env.IMAGE_TAG }} \
          ${{ env.ACR }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ matrix.service }}:${{ env.IMAGE_TAG }} \
          ${{ env.ACR }}/${{ env.REPOSITORY }}:latest

          docker push ${{ env.ACR }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR }}/${{ env.REPOSITORY }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@main
        with:
          role-to-assume: ${{ secrets.ACTIONS_IAM_ROLE  }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ steps.set-repo.outputs.REPOSITORY }}
        run: |
          docker tag ${{ matrix.service }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ matrix.service }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.REPOSITORY }}:latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.REPOSITORY }}:latest
